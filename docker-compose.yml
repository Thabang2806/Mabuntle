services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: swyftly-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-swyftly}
      POSTGRES_USER: ${POSTGRES_USER:-swyftly}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-swyftly_dev_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - swyftly-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-swyftly} -d ${POSTGRES_DB:-swyftly}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  swyftly-postgres-data:
